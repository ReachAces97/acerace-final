<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Race — Card Suits Only</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* ========== CARD SUIT PARTICLES CANVAS ========== */
        #cardCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        /* ========== CLEAN OVERLAY ========== */
        .overlay {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding: 40px 50px;
            background: rgba(10, 12, 18, 0.85);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 550px;
        }

        .overlay h1 {
            font-size: 3rem;
            margin-bottom: 6px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -moz-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            -moz-text-fill-color: transparent;
        }

        .overlay p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .suit-demo {
            font-size: 2.2rem;
            margin: 16px 0 8px 0;
            letter-spacing: 14px;
        }

        .suit-demo .red { color: #ef4444; }
        .suit-demo .black { color: #94a3b8; }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            padding: 3px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 1px;
        }

        @supports not (background-clip: text) {
            .overlay h1 {
                background: none;
                -webkit-text-fill-color: #ffffff;
                color: #ffffff;
            }
        }
    </style>
</head>
<body>

    <!-- ========== CARD SUIT CANVAS ========== -->
    <canvas id="cardCanvas"></canvas>

    <!-- ========== OVERLAY ========== -->
    <div class="overlay">
        <h1>♠ Ace Race ♥</h1>
        <p>Floating card suits • Clean • No glow</p>
        <div class="suit-demo">
            <span class="red">♦</span>
            <span class="black">♣</span>
            <span class="red">♥</span>
            <span class="black">♠</span>
        </div>
        <div class="badge">✦ INFINITE FLOAT ✦</div>
    </div>

    <!-- ========== CARD SUITS - NO GLOW, NO BEAMS ========== -->
    <script>
    (function() {
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const suits = ['♣', '♦', '♥', '♠'];
        const colors = {
            '♣': '#94a3b8',
            '♦': '#ef4444',
            '♥': '#ef4444',
            '♠': '#94a3b8'
        };

        const particleCount = 100;
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            const suit = suits[Math.floor(Math.random() * suits.length)];
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                suit: suit,
                size: 16 + Math.random() * 20,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.02,
                floatSpeed: 0.0005 + Math.random() * 0.002,
                floatAngle: Math.random() * Math.PI * 2,
                floatRadius: 30 + Math.random() * 80,
                opacity: 0.15 + Math.random() * 0.25,
                driftX: (Math.random() - 0.5) * 0.3,
                driftY: (Math.random() - 0.5) * 0.3
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let p of particles) {
                // Smooth floating motion
                p.floatAngle += p.floatSpeed;
                p.x += Math.cos(p.floatAngle) * p.floatRadius * 0.003 + p.driftX * 0.2;
                p.y += Math.sin(p.floatAngle * 0.7) * p.floatRadius * 0.002 + p.driftY * 0.2;
                p.rotation += p.rotationSpeed;

                // Wrap around edges
                if (p.x < -80) p.x = width + 80;
                if (p.x > width + 80) p.x = -80;
                if (p.y < -80) p.y = height + 80;
                if (p.y > height + 80) p.y = -80;

                // Draw suit - clean, no glow
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                
                ctx.font = `${p.size}px "Georgia", "Times New Roman", serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = colors[p.suit];
                ctx.fillText(p.suit, 0, 0);
                
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            for (let p of particles) {
                p.x = Math.random() * width;
                p.y = Math.random() * height;
            }
        });

        animate();
        console.log('♠ Clean card suits floating!');
    })();
    </script>

</body>
</html>
